<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Management - MVC CRUD</title>

  
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 20px auto;
      padding: 10px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items:center ;
    
    }

    h1 {
      text-align: center;
    }

    #order-form {
      background: #fff;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    #order-form input,
    #order-form select {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    #order-form label {
      font-weight: bold;
      font-size: 14px;
    }

    button {
      padding: 8px 14px; /*shorthand property TB LR */
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 6px;
    }

    #submit-btn {
      background: #d32f2f;
      color: #fff;
    }

    #cancel-btn {
      background: #999;
      color: #fff;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #333;
      color: #fff;
    }

    .edit-btn {
      background: #1976d2;
      color: #fff;
    }

    .delete-btn {
      background: #d32f2f;
      color: #fff;
    }

    #searchBox{
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid violet;
      border-radius: 15px;
      align-items: center;

    }

    #extras{
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      width: 50%;
    }

    #sort-select{

      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid violet;
      border-radius: 15px;
    }
  </style>
</head>
<body>

  <h1>Learning (MVC CRUD)</h1>
  <!--Search Bar-->
  <div id ="extras">
   <input type="text" id="searchBox" placeholder="Khojo....">

   <!---SORT SELCT-->

   <select id="sort-select">

    <option value="none">Select sort Order</option>
    <option value="asc">Price[Low to High]</option>
    <option value="desc">Price[High To Low]</option>
   </select>
  </div>
  <!--VIEW: FORM PART -->
  <form id="order-form">
    <!-- hidden field: bataata hai ki hum edit kar rahe hain ya naya add kar rahe hain -->
    <input type="hidden" id="orderId">

    <label>Customer Name</label>
    <input type="text" id="customerName" placeholder="e.g. Akshit Sharma">

    <label>Item Name</label>
    <input type="text" id="itemName" placeholder="e.g. Veg Burger">

    <label>Quantity</label>
    <input type="number" id="quantity" min="1" placeholder="e.g. 2">

    <label>Price (per item)</label>
    <input type="number" id="price" min="0" placeholder="e.g. 150">

    <label>Status</label>
    <select id="status">
      <option value="Pending">Pending</option>
      <option value="Completed">Completed</option>
    </select>

    <br><br>
    <button type="submit" id="submit-btn">Add Order</button>
    <button type="button" id="cancel-btn">Cancel</button>
  </form>

  <!--  VIEW: LISTING PART -->
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Item</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="order-table-body">
      <!-- with help of js will adding rows here dynamically -->
    </tbody>
  </table>

  
  <script src="OrderModel.js"></script>
  <script src="OrderView.js"></script>
  <script src="OrderController.js"></script>
  <script src="app.js"></script>
</body>
</html>
