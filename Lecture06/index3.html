<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <fieldset>
    <legend>Tabel Format Form</legend>
     <table border>
        <thead>
            <tr><th colspan="3">Form</th></tr>
        </thead>
        <tbody>
            <tr>
                <td>Name</td>
                <td colspan="2"><input type="text" placeholder="Enter Name"></td>
                <td></td>
            </tr>
            <tr>
                <td>Email</td>
                <td colspan="2"><input type="email" placeholder="Enter Email"></td>
                <td></td>
            </tr>
            <tr>
                <td>DOB</td>
                <td colspan="2"><input type="date"></td>
                <td></td>
            </tr>
            <tr>
                <td>Password</td>
                <td colspan="2"><input type="pass" placeholder="Enter Password"></td>
                <td></td>
            </tr>
            <tr>
                <td><label for="gender">Gender</label></td>
                <td>
                    <label>Male</label>
                    <input type="radio" name="gender">
                </td>
                <td>
                    <label>Female</label>
                    <input type="radio" name="gender">
                </td>
            </tr>
            <tr>
                <td colspan="3"><button>Submit</button></td>
            </tr>
        </tbody>
    </table>
   </fieldset>
</body>
</html>
