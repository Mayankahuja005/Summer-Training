<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <fieldset>
    <legend>Registration Form</legend>
    <form action="">
        <label for="name">Name</label>
        <input type="text" placeholder="Enter Name" id="name">
        <br>
        <br>
        <label for="email">Email</label>
        <input type="email" placeholder="Enter Email" id="email">
        <br>
        <br>
        <label for="phoneno.">Phone No.</label>
        <input type="text" placeholder="Enter Phone No." id="phoneno.">
        <br>
        <br>
        <label for="dob">DOB</label>
        <input type="date" id="dob">
        <br>
        <br>
        <label for="aadhaar card">Aadhaar</label>
        <input type="text" placeholder="Enter Aadhaar Card No." id="adhaar card">
        <br>
        <br>
        <label for="gender">Gender</label>
        <br>
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender">
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender">
        <label for="other">Other</label>
        <input type="radio" id="other" name="gender">
        <br>
        <br>
        <label for="username">Username</label>
        <input type="text" placeholder="Username" id="username">
        <br>
        <br>
        <label for="pass">Set Password</label>
        <input type="password" placeholder="eg->$528asd" id="pass">
        <br>
        <br>
        <label for="pass">Confirm Password</label>
        <input type="password" id="pass">
        <br>
        <br>
        <button>Submit</button>
        
    </form>
   </fieldset>
</body>
</html>
